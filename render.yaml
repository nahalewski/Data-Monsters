services:
  - type: web
    name: brady-m511-labeler
    runtime: static
    buildCommand: ""
    staticPublishPath: label-app
    pullRequestPreviewsEnabled: true
    headers:
      - path: /*
        name: Permissions-Policy
        value: bluetooth=(self)
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
